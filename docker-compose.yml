version: '3.8'

services:
  web:
    build: .
    container_name: portal-cadastro-web
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=root_password
      - DB_NAME=u643904105_bdlog
      - SITE_URL=http://localhost:8080
    depends_on:
      - db

  db:
    image: mysql:5.7
    container_name: portal-cadastro-db
    ports:
      - "3306:3306"
    volumes:
      - ./database:/docker-entrypoint-initdb.d
      - db_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=u643904105_bdlog
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  db_data:
